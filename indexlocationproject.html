<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Location - Premium Version</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #040615;
        --bg-2: #111a40;
        --glass: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.25);
        --text-main: #f6f8ff;
        --text-soft: #c7d3ff;
        --acc-1: #5fa7ff;
        --acc-2: #865dff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text-main);
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at 15% 5%, #1d2b77 0%, transparent 35%),
          radial-gradient(circle at 85% 95%, #5829a5 0%, transparent 30%),
          linear-gradient(130deg, var(--bg-1), var(--bg-2));
        overflow-x: hidden;
      }

      .orb {
        position: fixed;
        z-index: 0;
        border-radius: 50%;
        filter: blur(8px);
        opacity: 0.65;
        pointer-events: none;
      }

      .orb-left {
        width: 280px;
        height: 280px;
        top: -60px;
        left: -70px;
        background: radial-gradient(circle, #6bc4ff 0%, rgba(107, 196, 255, 0) 72%);
        animation: floatY 12s ease-in-out infinite;
      }

      .orb-right {
        width: 340px;
        height: 340px;
        right: -100px;
        bottom: -120px;
        background: radial-gradient(circle, #9264ff 0%, rgba(146, 100, 255, 0) 70%);
        animation: floatY 14s ease-in-out infinite reverse;
      }

      .page-wrap {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 14px;
      }

      .location-card {
        width: min(940px, 100%);
        border-radius: 26px;
        border: 1px solid var(--glass-border);
        background: var(--glass);
        backdrop-filter: blur(16px);
        box-shadow: 0 30px 65px rgba(0, 0, 0, 0.38);
        overflow: hidden;
        animation: cardReveal 800ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .location-header {
        padding: 28px 26px 18px;
        background: linear-gradient(130deg, rgba(95, 167, 255, 0.25), rgba(134, 93, 255, 0.2));
        border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      }

      .app-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.08);
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a6ffcf;
        box-shadow: 0 0 12px #7bffbb;
        animation: pulseDot 1.8s ease-in-out infinite;
      }

      .location-header h1 {
        margin: 14px 0 8px;
        font-size: clamp(1.3rem, 2vw, 1.9rem);
      }

      .location-header p {
        margin: 0;
        color: var(--text-soft);
      }

      .location-body {
        padding: 22px;
      }

      #halat {
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 12px;
        background: rgba(78, 139, 255, 0.2);
        color: #deebff;
        margin-bottom: 18px;
      }

      #halat.success {
        background: rgba(46, 179, 101, 0.22);
        color: #c9ffe0;
      }

      #halat.danger {
        background: rgba(192, 64, 64, 0.22);
        color: #ffd8d8;
      }

      .info-card {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 16px;
        background: rgba(10, 18, 50, 0.44);
        height: 100%;
        transition: transform 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
      }

      .info-card:hover {
        transform: translateY(-3px);
        border-color: rgba(255, 255, 255, 0.36);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.26);
      }

      .info-card .card-title {
        color: #bdd0ff;
        font-size: 0.92rem;
      }

      .metric {
        font-size: clamp(1rem, 1.9vw, 1.35rem);
        font-weight: 650;
        margin: 0;
        color: white;
      }

      .btn-lux {
        border: none;
        border-radius: 12px;
        background: linear-gradient(130deg, var(--acc-1), var(--acc-2));
        color: white;
        font-weight: 600;
        padding: 12px 16px;
        transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
      }

      .btn-lux:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(97, 109, 255, 0.42);
        filter: brightness(1.05);
      }

      .btn-outline-lux {
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.42);
        color: #eff4ff;
        background: rgba(255, 255, 255, 0.06);
        font-weight: 600;
        padding: 11px 16px;
        transition: all 220ms ease;
      }

      .btn-outline-lux:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.6);
      }

      .fade-in {
        animation: fadeRise 500ms ease;
      }

      @keyframes cardReveal {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes pulseDot {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.3);
          opacity: 0.72;
        }
      }

      @keyframes floatY {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-18px) scale(1.08);
        }
      }

      @keyframes fadeRise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
    }
    </style>
  </head>
  <body>
    <div class="orb orb-left" aria-hidden="true"></div>
    <div class="orb orb-right" aria-hidden="true"></div>

    <main class="page-wrap">
      <section class="location-card">
        <header class="location-header">
          <span class="app-badge">
            <span class="badge-dot"></span>
            Geolocation Project
          </span>
          <h1>Your Current Location</h1>
          <p>It takes (with your permission) your geolocation information and shows on the map.</p>
        </header>

        <div class="location-body">
          <div id="halat" class="alert" role="status">Taking geolocation information...</div>

          <div class="row g-3" id="netije" style="display: none">
            <div class="col-md-6">
              <div class="card info-card">
                <div class="card-body">
                  <h5 class="card-title">Latitude (North/South pin)</h5>
                  <p id="lat" class="metric">-</p>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="card info-card">
                <div class="card-body">
                  <h5 class="card-title">Longitude (East/West pin)</h5>
                  <p id="lng" class="metric">-</p>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card info-card">
                <div class="card-body">
                  <h5 class="card-title">Accuracy</h5>
                  <p id="accuracy" class="metric">-</p>
                </div>
              </div>
            </div>

            <div class="col-12 d-grid">
              <a id="mapLink" href="#" target="_blank" class="btn btn-lux">View on Map</a>
            </div>
          </div>

          <div class="mt-3 d-grid">
            <button id="btnYeneAl" class="btn btn-outline-lux">Retake geolocation</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const halat = document.getElementById("halat");
      const netije = document.getElementById("netije");
      const latText = document.getElementById("lat");
      const lngText = document.getElementById("lng");
      const accuracyText = document.getElementById("accuracy");
      const mapLink = document.getElementById("mapLink");
      const btnYeneAl = document.getElementById("btnYeneAl");

      function hlTypeUytget(text, type = "info") {
        halat.textContent = text;
        halat.className = "alert " + type;
      }

      function yuklemeGutardi() {
        btnYeneAl.disabled = false;
        btnYeneAl.textContent = "Retake geolocation";
      }

      function yerMaglumatAl() {
        if (!navigator.geolocation) {
          hlTypeUytget("Browser does not support geolocation.", "danger");
          netije.style.display = "none";
          yuklemeGutardi();
          return;
        }

        hlTypeUytget("Checking geolocation...", "info");
        btnYeneAl.disabled = true;
        btnYeneAl.textContent = "Checking...";
        netije.style.display = "none";

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            latText.textContent = lat.toFixed(6);
            lngText.textContent = lng.toFixed(6);
            accuracyText.textContent = accuracy.toFixed(0) + " meters accuracy";
            mapLink.href = "https://www.google.com/maps?q=" + lat + "," + lng;

            hlTypeUytget("Geolocation information retrieved successfully!", "success");
            netije.style.display = "flex";
            netije.classList.remove("fade-in");
            void netije.offsetWidth;
            netije.classList.add("fade-in");
            yuklemeGutardi();
          },
          (error) => {
            let message = "Error occurred while retrieving geolocation information.";
            switch (error.code) {
              case error.PERMISSION_DENIED:
                message = "Geolocation access denied.";
                break;
              case error.POSITION_UNAVAILABLE:
                message = "Geolocation information is unavailable.";
                break;
              case error.TIMEOUT:
                message = "Geolocation request timed out.";
                break;
              default:
                message = "An unknown error occurred.";
            }
            hlTypeUytget(message, "danger");
            netije.style.display = "none";
            yuklemeGutardi();
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          }
        );
      }

      btnYeneAl.addEventListener("click", yerMaglumatAl);
      window.addEventListener("DOMContentLoaded", yerMaglumatAl);
    </script>
  </body>
</html>
